name: Java CI with Gradle (NeoForge Only)

on:
  push:
    branches: [ "I18nUpdateMod3-only-neoforge" ]
  pull_request:
    branches: [ "I18nUpdateMod3-only-neoforge" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582

    - name: Build NeoForge Only
      run: ./gradlew build -Ploader=neoforge

    # ✅ 先看看所有 jar 在哪（调试用）
    - name: List all jar files
      run: find . -name "*.jar"

    # ✅ 上传所有找到的 jar，不管路径
    - name: Upload all jars
      uses: actions/upload-artifact@v4
      with:
        name: I18nUpdateMod3-Found-Jars
        path: "**/*.jar"
