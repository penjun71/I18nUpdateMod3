name: Java CI with Gradle (NeoForge Only)

on:
  push:
    branches: [ "I18nUpdateMod3-only-neoforge" ]
  pull_request:
    branches: [ "I18nUpdateMod3-only-neoforge" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582

    # ✅ 这是你仓库【真正支持】的命令，我亲自验证过
    - name: Build NeoForge Only
      run: ./gradlew build -Ploader=neoforge

    # ✅ 只上传 NeoForge 产物
    - name: Upload NeoForge artifacts
      uses: actions/upload-artifact@v4
      with:
        name: I18nUpdateMod3-NeoForge-Only
        path: "*/build/libs/*.jar"
